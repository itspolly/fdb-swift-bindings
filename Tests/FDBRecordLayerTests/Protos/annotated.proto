syntax = "proto2";

package fdb.test;

import "record_metadata_options.proto";

// A record whose primary key and indexes are declared via FoundationDB field annotations,
// exercising the proto-annotation metadata path.
message AnnotatedOrder {
  optional int64 order_id = 1 [(com.apple.foundationdb.record.field).primary_key = true];
  optional string flower = 2;
  optional int64 price = 3 [(com.apple.foundationdb.record.field).index = { type: "value" }];
  repeated string tags = 4 [(com.apple.foundationdb.record.field).index = { type: "value" }];
}
